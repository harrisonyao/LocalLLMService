services:
  local-llm-service:
    container_name: local-llm-service
    build:
      context: .
      dockerfile: Dockerfile
    image: localllmservice:latest
    env_file:
      - src/.env
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_HOME:-./.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 10m
